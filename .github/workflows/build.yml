name: Build and Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore PoTool.sln

      - name: Build
        run: dotnet build PoTool.sln --configuration Release --no-restore

      - name: Publish
        run: dotnet publish PoTool.App/PoTool.App.csproj --configuration Release --no-build --output ./publish

      - name: Upload published artifact
        uses: actions/upload-artifact@v4
        with:
          name: PoTool-publish
          path: publish
