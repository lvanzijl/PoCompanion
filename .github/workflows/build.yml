      - name: Restore dependencies
        run: dotnet restore PoTool.sln

      - name: Build
        run: dotnet build PoTool.sln --configuration Release --no-restore

      - name: Check sync-over-async patterns
        run: ./.github/scripts/check-sync-over-async.sh

      - name: API Contract gate
        env:
          GATE_RUN_ID: ${{ github.run_id }}
        run: ./.github/scripts/run-api-contract-gate.sh "${{ runner.temp }}/api-contract-gate"

      - name: Upload API Contract Gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-contract-gate-${{ github.run_id }}
          path: ${{ runner.temp }}/api-contract-gate

  governance-gate:
    name: Governance Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore PoTool.sln

      - name: Build
        run: dotnet build PoTool.sln --configuration Release --no-restore

      - name: Check sync-over-async patterns
