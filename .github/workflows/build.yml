name: Build and Test Gates

on:
  push:
    branches:
      - main
      - release/**
  pull_request:

jobs:
  core-gate:
    name: Core Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GATE_OUTPUT_DIR: ${{ runner.temp }}/core-gate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore PoTool.sln

      - name: Build
        run: dotnet build PoTool.sln --configuration Release --no-restore

      - name: Check sync-over-async patterns
        run: ./.github/scripts/check-sync-over-async.sh

      - name: Prepare Core Gate artifact directory
        run: mkdir -p "$GATE_OUTPUT_DIR"

      - name: Run Core Gate
        id: run_core_gate
        env:
          GATE_RUN_ID: ${{ github.run_id }}
        run: ./.github/scripts/run-core-gate.sh "$GATE_OUTPUT_DIR"

      - name: Upload Core Gate artifacts
        if: ${{ always() && steps.run_core_gate.outcome != 'skipped' }}
        uses: actions/upload-artifact@v4
        with:
          name: core-gate-${{ github.run_id }}
          path: ${{ env.GATE_OUTPUT_DIR }}
          if-no-files-found: error

  api-contract-gate:
    name: API Contract Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GATE_OUTPUT_DIR: ${{ runner.temp }}/api-contract-gate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore PoTool.sln

      - name: Build
        run: dotnet build PoTool.sln --configuration Release --no-restore

      - name: Prepare API Contract Gate artifact directory
        run: mkdir -p "$GATE_OUTPUT_DIR"

      - name: Run API Contract Gate
        id: run_api_contract_gate
        env:
          GATE_RUN_ID: ${{ github.run_id }}
        run: ./.github/scripts/run-api-contract-gate.sh "$GATE_OUTPUT_DIR"

      - name: Upload API Contract Gate artifacts
        if: ${{ always() && steps.run_api_contract_gate.outcome != 'skipped' }}
        uses: actions/upload-artifact@v4
        with:
          name: api-contract-gate-${{ github.run_id }}
          path: ${{ env.GATE_OUTPUT_DIR }}
          if-no-files-found: error

  governance-gate:
    name: Governance Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GATE_OUTPUT_DIR: ${{ runner.temp }}/governance-gate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore PoTool.sln

      - name: Build
        run: dotnet build PoTool.sln --configuration Release --no-restore

      - name: Prepare Governance Gate artifact directory
        run: mkdir -p "$GATE_OUTPUT_DIR"

      - name: Run Governance Gate
        id: run_governance_gate
        env:
          GATE_RUN_ID: ${{ github.run_id }}
        run: ./.github/scripts/run-governance-gate.sh "$GATE_OUTPUT_DIR"

      - name: Upload Governance Gate artifacts
        if: ${{ always() && steps.run_governance_gate.outcome != 'skipped' }}
        uses: actions/upload-artifact@v4
        with:
          name: governance-gate-${{ github.run_id }}
          path: ${{ env.GATE_OUTPUT_DIR }}
          if-no-files-found: error
