name: Build and Test Gates

on:
  push:
    branches:
      - main
      - release/**
  pull_request:

jobs:
  core-gate:
    name: Core Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore PoTool.sln

      - name: Build
        run: dotnet build PoTool.sln --configuration Release --no-restore

      - name: Check sync-over-async patterns
        run: ./.github/scripts/check-sync-over-async.sh

      - name: Core gate
        env:
          GATE_RUN_ID: ${{ github.run_id }}
        run: ./.github/scripts/run-core-gate.sh "${{ runner.temp }}/core-gate"

      - name: Upload Core Gate artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-gate-${{ github.run_id }}
          path: ${{ runner.temp }}/core-gate

  api-contract-gate:
    name: API Contract Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
