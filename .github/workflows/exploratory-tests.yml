name: Exploratory Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  exploratory-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore

      - name: Install Playwright browsers
        run: dotnet build
        working-directory: PoTool.Tests.AutomatedExploratory

      - name: Install Playwright dependencies  
        run: pwsh PoTool.Tests.AutomatedExploratory/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Run exploratory tests
        run: dotnet test --no-build --verbosity normal
        working-directory: PoTool.Tests.AutomatedExploratory

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: PoTool.Tests.AutomatedExploratory/playwright-report/
          retention-days: 30
