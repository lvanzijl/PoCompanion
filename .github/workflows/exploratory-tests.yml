name: Exploratory Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  exploratory-tests:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
          dotnet-quality: preview

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Install Playwright browsers
        run: pwsh PoTool.Tests.AutomatedExploratory/bin/Release/net10.0/playwright.ps1 install --with-deps chromium

      - name: Start Blazor application
        run: |
          cd PoTool.Api
          ASPNETCORE_ENVIRONMENT=Development dotnet run --no-build --configuration Release --urls http://localhost:5001 > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid
          cd ..
          echo "Waiting for application to start..."
          for i in {1..30}; do
            if curl -s http://localhost:5001/health > /dev/null 2>&1; then
              echo "Application is ready!"
              break
            fi
            echo "Attempt $i/30: Waiting for application..."
            sleep 2
          done
          if ! curl -s http://localhost:5001/health > /dev/null 2>&1; then
            echo "Application failed to start. Logs:"
            cat /tmp/api.log
            exit 1
          fi

      - name: Run exploratory tests
        run: dotnet test --configuration Release --no-build --verbosity normal
        working-directory: PoTool.Tests.AutomatedExploratory

      - name: Stop Blazor application
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            kill $(cat /tmp/api.pid) 2>/dev/null || true
            echo "Application stopped"
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: exploratory-test-results
          path: PoTool.Tests.AutomatedExploratory/bin/Release/net10.0/test-results/
          retention-days: 30
          if-no-files-found: warn
